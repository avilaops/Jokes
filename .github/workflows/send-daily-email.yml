name: Enviar Email Diário - Máquina de Vencer

on:
  schedule:
    # Executa todo dia às 15:00 (horário UTC = 12:00 PM UTC)
    # Para 15h horário de Brasília (UTC-3), configure para 18:00 UTC
    - cron: '0 18 * * *'  # 18:00 UTC = 15:00 BRT (Brasília)
  workflow_dispatch:  # Permite executar manualmente

jobs:
  send-email:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout do código
      uses: actions/checkout@v3
    
    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Instalar dependências
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Enviar email
      env:
        SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
        FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
        TO_EMAILS: ${{ secrets.TO_EMAILS }}
      run: |
        python send_email.py
